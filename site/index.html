<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>DEAD RECKONING — a GPS interference archive</title>
<meta name="description" content="A longitudinal archive of GPS/GNSS interference, indicated by degraded aircraft navigation integrity (ADS-B NIC). Scrub multi-day history, per-hex baselines, named watch regions." />

<!-- Open Graph / Twitter -->
<meta property="og:type" content="website" />
<meta property="og:title" content="DEAD RECKONING — a GPS interference archive" />
<meta property="og:description" content="Where satellite navigation degrades, remembered over time. Built from open ADS-B data." />
<meta property="og:image" content="assets/og-image.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="DEAD RECKONING — a GPS interference archive" />
<meta name="twitter:description" content="Where satellite navigation degrades, remembered over time." />
<meta name="twitter:image" content="assets/og-image.png" />

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <span class="brand">DEAD<span class="dot">·</span>RECKONING</span>
    <span class="tagline">GPS interference, remembered.</span>
    <span class="spacer"></span>
    <nav>
      <a href="index.html">Map</a>
      <a href="methodology.html">Methodology</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <div id="map">
    <!-- overlays -->
    <div class="map-overlay controls">
      <div class="panel">
        <h3>Layer</h3>
        <div class="seg" id="modeToggle" role="group" aria-label="color mode">
          <button data-mode="anomaly" aria-pressed="true">Anomaly</button>
          <button data-mode="raw" aria-pressed="false">Raw ratio</button>
        </div>
        <label class="check"><input type="checkbox" id="coverageToggle" />
          Show coverage (low-sample)</label>
      </div>
    </div>

    <div class="map-overlay legend panel">
      <h3 id="legendTitle">Anomaly (σ from baseline)</h3>
      <div class="ramp anom" id="legendRamp"></div>
      <div class="ramp-labels"><span id="legLo">0</span><span id="legHi">6+</span></div>
      <div class="swatch-row"><span class="swatch insufficient"></span>
        insufficient data (&lt;<span id="floorN">5</span> aircraft)</div>
    </div>

    <div class="map-overlay region-chips" id="regionChips"></div>

    <div class="map-overlay readout panel empty" id="readout">
      <div class="hexid" id="roHex">— hover a cell —</div>
      <div class="big" id="roVal">—</div>
      <div class="row"><span id="roAircraft">aircraft —</span>
        <span class="conf" id="roConf">—</span></div>
    </div>

    <div class="event-card" id="eventCard"></div>

    <!-- region drawer -->
    <aside class="drawer" id="drawer" aria-hidden="true">
      <header>
        <div>
          <div class="rid" id="drRid">region</div>
          <h2 id="drName">Region</h2>
        </div>
        <button class="close" id="drClose" aria-label="close">×</button>
      </header>
      <div class="body" id="drBody"></div>
    </aside>

    <div class="loader" id="loader">
      <div class="core">
        <div class="sweep"></div>
        <div class="msg">acquiring signal…</div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>

  <div class="scrubber">
    <div class="scrub-head">
      <span class="scrub-date" id="scrubDate">————-——-——</span>
      <span class="scrub-meta" id="scrubMeta"></span>
    </div>
    <div class="scrub-row">
      <button class="play" id="playBtn" aria-label="play">▶</button>
      <div class="track-wrap">
        <div class="track"><div class="fill" id="trackFill"></div></div>
        <div class="ticks" id="ticks"></div>
        <input type="range" class="slider" id="slider" min="0" max="0" value="0" step="1" />
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
<script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>
<script src="js/color.js"></script>
<script src="js/app.js"></script>
</body>
</html>
